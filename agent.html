<!DOCTYPE html>
<html>
<head>
  <title>Agent Panel</title>
</head>
<body>

<h2>Agent Panel</h2>

<div id="info"></div>

<button onclick="logout()">Logout</button>

<script>

// 🔐 check login
let role = localStorage.getItem("role");
let users = JSON.parse(localStorage.getItem("users")) || [];

if(role !== "agent"){
  document.body.innerHTML = "<h2>Access Denied</h2>";
}

// show approved users only
function load(){

let box = document.getElementById("info");
box.innerHTML = "<h3>Approved Users List</h3>";

users.forEach(u=>{

if(u.status === "approved" && u.role !== "mother"){

box.innerHTML += `
  <p>${u.username} (${u.role}) ✔</p>
`;

}

});

}

load();

// logout
function logout(){
  localStorage.clear();
  location.href = "index.html";
}

</script>

</body>
</html>
