<!DOCTYPE html>
<html>
<head>
<title>Agent Panel</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

/* TOP BAR */
.topbar{
background:#f4b400;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
color:#000;
font-weight:bold;
}

/* MENU */
.menu{
background:#222;
color:#fff;
padding:10px;
font-size:14px;
}

/* STATS */
.stats{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:10px;
}

.card{
background:#fff;
padding:10px;
flex:1;
min-width:120px;
border-radius:5px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
font-size:13px;
}

/* TABLE */
.table-box{
background:#fff;
margin:10px;
padding:10px;
border-radius:5px;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#000;
color:#fff;
}

button{
padding:5px 10px;
border:none;
cursor:pointer;
border-radius:3px;
}

.add{
background:#28a745;
color:#fff;
}

.del{
background:red;
color:#fff;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  Gamebuzz Panel
  <button onclick="logout()">Logout</button>
</div>

<!-- MENU -->
<div class="menu">
Dashboard | Agents | Reports | Banking
</div>

<!-- STATS -->
<div class="stats">
  <div class="card">Balance: 1000</div>
  <div class="card">Exposure: 0</div>
  <div class="card">Profit/Loss: 0</div>
</div>

<!-- TABLE -->
<div class="table-box">

<button class="add" onclick="create()">+ Add User</button>

<table>
<thead>
<tr>
<th>Username</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="list"></tbody>

</table>

</div>

<script>

// role check
let role = localStorage.getItem("role");
if(role !== "agent"){
alert("Access Denied");
location.href = "index.html";
}

// create user
function create(){

let name = prompt("Enter username:");
let pass = prompt("Enter password:");

if(!name || !pass){
alert("Fill all");
return;
}

let users = JSON.parse(localStorage.getItem("users")) || [];

users.push({
username:name,
password:pass,
role:"user"
});

localStorage.setItem("users", JSON.stringify(users));

show();
}

// show users
function show(){

let users = JSON.parse(localStorage.getItem("users")) || [];
let box = document.getElementById("list");

box.innerHTML = "";

users.forEach(u=>{
if(u.role === "user"){
box.innerHTML += `
<tr>
<td>${u.username}</td>
<td>Active</td>
<td>
<button class="del" onclick="del('${u.username}')">Delete</button>
</td>
</tr>
`;
}
});

}

function del(name){
let users = JSON.parse(localStorage.getItem("users")) || [];
users = users.filter(u => u.username !== name);
localStorage.setItem("users", JSON.stringify(users));
show();
}

// logout
function logout(){
localStorage.clear();
location.href="index.html";
}

show();

</script>

</body>
</html>
