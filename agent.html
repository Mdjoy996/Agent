<!DOCTYPE html>
<html>
<head>
  <title>Agent Panel</title>
</head>
<body>

<h2>Agent Panel</h2>
<p>Create User Only</p>

<input id="username" placeholder="User Username"><br><br>
<input id="password" placeholder="Password"><br><br>

<button onclick="createUser()">Create User</button>

<hr>

<h3>User List</h3>
<div id="list"></div>

<script>

// access check
if(localStorage.getItem("role") !== "agent"){
  document.body.innerHTML = "<h2>Access Denied</h2>";
}

// load users
load();

function createUser(){

let u = document.getElementById("username").value;
let p = document.getElementById("password").value;

let users = JSON.parse(localStorage.getItem("users")) || [];

// add user (final level)
users.push({
  username: u,
  password: p,
  role: "user",
  createdBy: "agent",
  status: "pending"
});

localStorage.setItem("users", JSON.stringify(users));

alert("User Created (Pending)");

load();
}

function load(){

let users = JSON.parse(localStorage.getItem("users")) || [];
let box = document.getElementById("list");

box.innerHTML = "";

users.forEach(u=>{
  if(u.role === "user"){
    box.innerHTML += `
      <p>${u.username} - ${u.status}</p>
    `;
  }
});

}

</script>

</body>
</html>
