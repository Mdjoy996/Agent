<!DOCTYPE html>
<html>
<head>
<title>Mother Panel</title>
<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

h2{
color:#333;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px;
width:100%;
background:black;
color:#ffcc00;
border:none;
border-radius:8px;
cursor:pointer;
}

.box{
background:white;
padding:15px;
border-radius:10px;
margin-top:20px;
}
</style>
</head>

<body>

<h2>Mother Panel</h2>
<p>Create Super Admin Only</p>

<div class="box">

<input id="username" placeholder="Super Admin Username">
<input id="password" placeholder="Password">

<button onclick="create()">Create Super Admin</button>

</div>

<div class="box">
<h3>Super Admin List</h3>
<div id="list"></div>
</div>

<script>

// login check
let role = localStorage.getItem("role");
if(role !== "mother"){
alert("Access Denied");
location.href = "index.html";
}

// create superadmin
function create(){

let u = document.getElementById("username").value;
let p = document.getElementById("password").value;

if(u === "" || p === ""){
alert("Fill all fields");
return;
}

let users = JSON.parse(localStorage.getItem("users")) || [];

// add new user
users.push({
username: u,
password: p,
role: "superadmin",
createdBy: "mother"
});

localStorage.setItem("users", JSON.stringify(users));

alert("Super Admin Created");

show();
}

// show list
function show(){

let users = JSON.parse(localStorage.getItem("users")) || [];
let box = document.getElementById("list");

box.innerHTML = "";

users.forEach(u=>{
if(u.role === "superadmin"){
box.innerHTML += `<p>👤 ${u.username}</p>`;
}
});

}

show();

</script>

</body>
</html>
