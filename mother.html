<!DOCTYPE html>
<html>
<head>
  <title>Mother Panel</title>
</head>
<body>

<h2>Mother Panel</h2>
<p>Create Super Admin Only</p>

<input id="username" placeholder="Super Admin Username"><br><br>
<input id="password" placeholder="Password"><br><br>

<button onclick="create()">Create Super Admin</button>

<hr>

<h3>Super Admin List</h3>
<div id="list"></div>

<script>

// load users
show();

function create(){

let u = document.getElementById("username").value;
let p = document.getElementById("password").value;

let users = JSON.parse(localStorage.getItem("users")) || [];

// only superadmin create
users.push({
  username: u,
  password: p,
  role: "superadmin",
  createdBy: "mother",
  status: "approved"
});

localStorage.setItem("users", JSON.stringify(users));

alert("Super Admin Created");

show();
}

function show(){

let users = JSON.parse(localStorage.getItem("users")) || [];
let box = document.getElementById("list");

box.innerHTML = "";

users.forEach(u=>{
  if(u.role === "superadmin"){
    box.innerHTML += `
      <p>${u.username}</p>
    `;
  }
});

}

</script>

</body>
</html>
