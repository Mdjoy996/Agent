<!DOCTYPE html>
<html>
<head>
  <title>Mother Panel</title>
</head>
<body>

<h2>Mother Panel - Create User</h2>

<input id="newUser" placeholder="Username"><br><br>
<input id="newPass" placeholder="Password"><br><br>

<select id="role">
  <option value="superadmin">Super Admin</option>
  <option value="admin">Admin</option>
  <option value="agent">Agent</option>
</select><br><br>

<button onclick="createUser()">Create User</button>

<hr>

<h3>Created Users</h3>
<div id="list"></div>

<script>

// load users
showUsers();

function createUser(){

let u = document.getElementById("newUser").value;
let p = document.getElementById("newPass").value;
let r = document.getElementById("role").value;

// get old users
let users = JSON.parse(localStorage.getItem("users")) || [];

// add new user
users.push({username:u, password:p, role:r});

localStorage.setItem("users", JSON.stringify(users));

alert("User Created!");

showUsers();
}

// show users
function showUsers(){

let users = JSON.parse(localStorage.getItem("users")) || [];
let box = document.getElementById("list");

box.innerHTML = "";

users.forEach((u,i)=>{
  box.innerHTML += `
    <p>
      ${i+1}. ${u.username} (${u.role})
    </p>
  `;
});

}

</script>

</body>
</html>
