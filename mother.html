<!DOCTYPE html>
<html>
<head>
  <title>Mother Panel</title>
</head>
<body>

<script>
// 🔐 SECURITY CHECK
if(localStorage.getItem("role") !== "mother"){
  document.body.innerHTML = "<h2>Access Denied</h2>";
}
</script>

<h2>Mother Panel</h2>
<p>Create Super Admin Only</p>

<input id="username" placeholder="Super Admin Username"><br><br>
<input id="password" placeholder="Password"><br><br>

<button onclick="create()">Create Super Admin</button>

<hr>

<h3>Super Admin List</h3>
<div id="list"></div>

<script>

// load users
show();

function create(){

let u = document.getElementById("username").value;
let p = document.getElementById("password").value;

if(u === "" || p === ""){
  alert("Fill all fields");
  return;
}

let users = JSON.parse(localStorage.getItem("users")) || [];

// duplicate check
let exist = users.find(x => x.username === u);

if(exist){
  alert("User already exists");
  return;
}

// add superadmin
users.push({
  username: u,
  password: p,
  role: "superadmin",
  createdBy: "mother",
  status: "approved"
});

localStorage.setItem("users", JSON.stringify(users));

alert("Super Admin Created");

show();
}

function show(){

let users = JSON.parse(localStorage.getItem("users")) || [];
let box = document.getElementById("list");

box.innerHTML = "";

let found = false;

users.forEach(u=>{
  if(u.role === "superadmin"){
    found = true;
    box.innerHTML += `<p>👤 ${u.username}</p>`;
  }
});

if(!found){
  box.innerHTML = "<p>No Super Admin Found</p>";
}

}

</script>

</body>
</html>
