<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
padding:50px;
}
</style>
</head>

<body>

<h1>Welcome Dashboard</h1>

<p id="user"></p>
<p id="role"></p>

<button onclick="logout()">Logout</button>

<script>

let user = localStorage.getItem("currentUser");
let role = localStorage.getItem("role");

document.getElementById("user").innerText = "User: " + user;
document.getElementById("role").innerText = "Role: " + role;

function logout(){
localStorage.clear();
location.href = "index.html";
}

</script>

</body>
</html>
