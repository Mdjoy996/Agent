<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body{
      margin:0;
      font-family:Arial;
      display:flex;
      height:100vh;
    }

    .menu{
      width:220px;
      background:#111;
      color:white;
      padding:10px;
    }

    .menu button{
      width:100%;
      padding:10px;
      margin:5px 0;
      background:#222;
      color:white;
      border:none;
      cursor:pointer;
    }

    .menu button:hover{
      background:#444;
    }

    .main{
      flex:1;
      padding:20px;
    }

    .topbar{
      background:#eee;
      padding:10px;
      display:flex;
      justify-content:space-between;
    }

    #content{
      margin-top:20px;
      padding:15px;
      background:#f5f5f5;
    }
  </style>
</head>

<body>

<!-- LOGIN CHECK -->
<script>
if(localStorage.getItem("auth") !== "true"){
  window.location.href = "./index.html";
}
</script>

<div class="menu">
  <h3>Menu</h3>

  <button onclick="showPage('dashboard')">Dashboard</button>
  <button onclick="showPage('downline')">Downline List</button>
  <button onclick="showPage('account')">My Account</button>
  <button onclick="showPage('reports')">My Reports</button>
  <button onclick="showPage('bet')">Bet List</button>
  <button onclick="showPage('live')">BetList Live</button>
  <button onclick="showPage('risk')">Risk Management</button>
  <button onclick="showPage('bank')">Agent Banking</button>
</div>

<div class="main">

  <div class="topbar">
    <span>Agent Panel</span>
    <button onclick="logout()">Logout</button>
  </div>

  <div id="content"></div>

</div>

<script>
function showPage(page){

  let content = document.getElementById("content");

  if(page === "dashboard"){
    content.innerHTML = "<h2>Dashboard</h2><p>Welcome 👋</p>";
  }
  else if(page === "downline"){
    content.innerHTML = "<h2>Downline List</h2><p>No data found</p>";
  }
  else if(page === "account"){
    content.innerHTML = "<h2>My Account</h2><p>Account details here</p>";
  }
  else if(page === "reports"){
    content.innerHTML = "<h2>Reports</h2><p>Reports section</p>";
  }
  else if(page === "bet"){
    content.innerHTML = "<h2>Bet List</h2><p>Bet history</p>";
  }
  else if(page === "live"){
    content.innerHTML = "<h2>Live Bets</h2><p>Live data</p>";
  }
  else if(page === "risk"){
    content.innerHTML = "<h2>Risk Management</h2><p>Risk control panel</p>";
  }
  else if(page === "bank"){
    content.innerHTML = "<h2>Agent Banking</h2><p>Banking info</p>";
  }
}

function logout(){
  localStorage.removeItem("auth");
  window.location.href = "./index.html";
}

// default page
showPage("dashboard");
</script>

</body>
</html>
