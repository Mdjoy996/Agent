<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
</head>
<body>

<h2>Dashboard</h2>

<div>
  <button onclick="show('home')">Home</button>
  <button onclick="show('profile')">Profile</button>
  <button onclick="show('reports')">Reports</button>

  <button onclick="openPanel('mother')">Mother Panel</button>
  <button onclick="openPanel('superadmin')">Super Admin</button>
  <button onclick="openPanel('admin')">Admin</button>
  <button onclick="openPanel('agent')">Agent</button>

  <button onclick="logout()">Logout</button>
</div>

<hr>

<div id="content"></div>

<script>

// 🔐 login check
if(localStorage.getItem("auth") !== "true"){
  location.href = "index.html";
}

let role = localStorage.getItem("role");

// default page
show("home");

function show(page){

let c = document.getElementById("content");

if(page === "home"){
  c.innerHTML = "<h3>Welcome Dashboard</h3>";
}
else if(page === "profile"){
  c.innerHTML = "<h3>My Profile</h3>";
}
else if(page === "reports"){
  c.innerHTML = "<h3>Reports Section</h3>";
}

}

// 🔐 role based panel
function openPanel(type){

if(type === "mother"){
  if(role !== "mother"){
    alert("Access Denied");
    return;
  }
  location.href = "mother.html";
}

if(type === "superadmin"){
  if(role !== "superadmin" && role !== "mother"){
    alert("Access Denied");
    return;
  }
  location.href = "superadmin.html";
}

if(type === "admin"){
  location.href = "admin.html";
}

if(type === "agent"){
  location.href = "agent.html";
}

}

// logout
function logout(){
  localStorage.clear();
  location.href = "index.html";
}

</script>

</body>
</html>
