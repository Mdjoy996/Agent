<!DOCTYPE html>
<html>
<head>
<title>Super Admin Panel</title>
<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

h2{
color:#333;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px;
width:100%;
background:black;
color:#ffcc00;
border:none;
border-radius:8px;
cursor:pointer;
}

.box{
background:white;
padding:15px;
border-radius:10px;
margin-top:20px;
}
</style>
</head>

<body>
  
<button onclick="logout()">Logout</button>
  
<h2>Super Admin Panel</h2>
<p>Create Admin Only</p>

<div class="box">

<input id="username" placeholder="Admin Username">
<input id="password" placeholder="Password">

<button onclick="create()">Create Admin</button>

</div>

<div class="box">
<h3>Admin List</h3>
<div id="list"></div>
</div>

<script>

// login check
let role = localStorage.getItem("role");
if(role !== "superadmin"){
alert("Access Denied");
location.href = "index.html";
}

// create admin
function create(){

let u = document.getElementById("username").value;
let p = document.getElementById("password").value;

if(u === "" || p === ""){
alert("Fill all fields");
return;
}

let users = JSON.parse(localStorage.getItem("users")) || [];

users.push({
username: u,
password: p,
role: "admin",
createdBy: "superadmin"
});

localStorage.setItem("users", JSON.stringify(users));

alert("Admin Created");

show();
}

// show list
function show(){

let users = JSON.parse(localStorage.getItem("users")) || [];
let box = document.getElementById("list");

box.innerHTML = "";

users.forEach(u=>{
if(u.role === "admin"){
box.innerHTML += `<p>👤 ${u.username}</p>`;
}
});

}

show();
function logout(){
localStorage.removeItem("role");
localStorage.removeItem("currentUser");
location.href = "index.html";
}
</script>

</body>
</html>
