<!DOCTYPE html>
<html>
<head>
  <title>Super Admin Panel</title>
</head>
<body>

<h2>Super Admin Panel</h2>

<button onclick="loadUsers()">Refresh Users</button>

<hr>

<h3>Pending Users</h3>
<div id="pending"></div>

<h3>Approved Users</h3>
<div id="approved"></div>

<script>

// load on open
loadUsers();

function loadUsers(){

let users = JSON.parse(localStorage.getItem("users")) || [];

let pendingBox = document.getElementById("pending");
let approvedBox = document.getElementById("approved");

pendingBox.innerHTML = "";
approvedBox.innerHTML = "";

// loop users
users.forEach((u,i)=>{

// default status (if not set)
if(!u.status){
  u.status = "pending";
}

// pending
if(u.status === "pending"){
  pendingBox.innerHTML += `
    <p>
      ${u.username} (${u.role})
      <button onclick="approve(${i})">Approve</button>
    </p>
  `;
}

// approved
if(u.status === "approved"){
  approvedBox.innerHTML += `
    <p>
      ${u.username} (${u.role}) ✔ Approved
    </p>
  `;
}

});

}

// approve user
function approve(index){

let users = JSON.parse(localStorage.getItem("users")) || [];

users[index].status = "approved";

localStorage.setItem("users", JSON.stringify(users));

alert("User Approved!");

loadUsers();
}

</script>

</body>
</html>
