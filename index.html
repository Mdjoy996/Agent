<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>10cricket.live Login</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(#062b06,#4caf00);
}

.top{
width:100%;
height:340px;
overflow:hidden;
border-bottom-left-radius:20% 60px;
border-bottom-right-radius:20% 60px;
}

.top img{
width:100%;
height:100%;
object-fit:cover;
}

.form{
width:92%;
max-width:380px;
margin:90px auto 0 auto;
}

.inputBox input{
width:100%;
height:55px;
border-radius:15px;
border:none;
outline:none;
padding:0 15px;
font-size:16px;
background:#f2f2f2;
box-sizing:border-box;
margin-bottom:15px;
}

.passwordBox{
position:relative;
}

.passwordBox input{
padding-right:45px;
}

.toggle{
position:absolute;
right:15px;
top:18px;
cursor:pointer;
}

.btn{
width:100%;
height:55px;
border:none;
border-radius:15px;
background:#000;
color:#ffcc00;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

footer{
background:#0b0b0b;
color:#fff;
padding:25px 15px;
text-align:center;
margin-top:50px;
}
</style>
</head>

<body>

<div class="top">
<img src="login-banner.png">
</div>

<div class="form">

<form id="loginForm">

<div class="inputBox">
<input type="text" id="username" placeholder="Username">
</div>

<div class="inputBox passwordBox">
<input type="password" id="password" placeholder="Password">
<span class="toggle" onclick="togglePassword()">👁</span>
</div>

<button class="btn" type="submit">LOGIN</button>

</form>

</div>

<script>

// password toggle
function togglePassword(){
let p = document.getElementById("password");
p.type = (p.type === "password") ? "text" : "password";
}

// form submit fix
document.getElementById("loginForm").addEventListener("submit", function(e){
e.preventDefault();
login();
});

function login(){

let username = document.getElementById("username").value;
let password = document.getElementById("password").value;

// default mother user
let users = [
  {username:"mother", password:"1234", role:"mother"}
];

// saved users
let savedUsers = JSON.parse(localStorage.getItem("users")) || [];
users = users.concat(savedUsers);

// match user
let user = users.find(u => u.username === username && u.password === password);

if(!user){
alert("Wrong username or password");
return;
}

// save session
localStorage.setItem("role", user.role);
localStorage.setItem("currentUser", user.username);

// redirect fix
if(user.role === "mother"){
location.href = "mother.html";
}
else if(user.role === "superadmin"){
location.href = "superadmin.html";
}
else if(user.role === "admin"){
location.href = "admin.html";
}
else if(user.role === "agent"){
location.href = "agent.html";
}
else{
location.href = "dashboard.html";
}

}

</script>

</body>
</html>
